name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: jwt-cracker-rust

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            archive: tar.gz
            binary: jwt-cracker-rust
          - target: x86_64-pc-windows-gnu
            archive: zip
            binary: jwt-cracker-rust.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must match vMAJOR.MINOR.PATCH, for example v0.1.0"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linkers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools mingw-w64 zip

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${package}/"
          cp README.md LICENSE "dist/${package}/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          git cliff --current --strip header --output changelog.md
          python - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["GITHUB_REF_NAME"]
          template = Path(".github/RELEASE_TEMPLATE.md").read_text(encoding="utf-8")
          changelog = Path("changelog.md").read_text(encoding="utf-8").strip()
          notes = (
              template
              .replace("{{ version }}", version)
              .replace("{{ version_without_v }}", version.removeprefix("v"))
              .replace("<!-- CHANGELOG -->", changelog or "No notable changes.")
          )
          Path("release-notes.md").write_text(notes, encoding="utf-8")
          PY

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
